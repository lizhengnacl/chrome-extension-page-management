<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome 页面管理 - 新标签页</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="newtab.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
  <div id="app">
    <header class="header" role="banner">
      <div class="header-left">
        <h1 class="title">页面管理</h1>
      </div>
      <div class="header-center">
        <button id="addFolderBtn" class="btn btn-secondary" aria-label="新建分组">新建分组</button>
        <button id="addCurrentPageBtn" class="btn btn-secondary" aria-label="添加当前页面">添加当前页</button>
        <button id="addPageBtn" class="btn btn-primary" aria-label="添加页面">添加页面</button>
      </div>
      <div class="header-right">
        <button id="importBtn" class="btn btn-secondary btn-icon" title="导入数据" aria-label="导入数据"><i data-feather="download"></i></button>
        <button id="exportBtn" class="btn btn-secondary btn-icon" title="导出数据" aria-label="导出数据"><i data-feather="upload"></i></button>
        <button id="settingsBtn" class="btn btn-secondary btn-icon" aria-label="设置"><i data-feather="settings"></i></button>
      </div>
    </header>
    
    <main class="main" role="main">
      <div id="undoBar" class="undo-bar hidden" role="alert" aria-live="polite">
        <span>页面已删除</span>
        <button id="undoBtn" class="btn btn-secondary btn-small" aria-label="撤销删除">撤销</button>
      </div>
      
      <div class="search-section">
        <div class="search-box-wrapper">
          <label for="searchInput" class="sr-only">搜索页面</label>
          <input type="text" id="searchInput" placeholder="搜索页面..." class="search-input-large" aria-label="搜索页面">
        </div>
        <div id="searchSuggestions" class="search-suggestions hidden" role="listbox" aria-label="搜索建议"></div>
      </div>
      
      <section id="dashboard" class="dashboard" role="region" aria-label="统计仪表盘">
        <div class="dashboard-header">
          <h2 class="dashboard-title"><i data-feather="bar-chart-2" style="display:inline-block;vertical-align:middle;margin-right:8px;"></i> 数据概览</h2>
        </div>
        <div class="dashboard-stats">
          <div class="stat-card">
            <div class="stat-icon"><i data-feather="file-text"></i></div>
            <div class="stat-content">
              <div class="stat-value" id="totalPages">0</div>
              <div class="stat-label">总页面</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i data-feather="folder"></i></div>
            <div class="stat-content">
              <div class="stat-value" id="totalFolders">0</div>
              <div class="stat-label">总分组</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i data-feather="eye"></i></div>
            <div class="stat-content">
              <div class="stat-value" id="totalVisits">0</div>
              <div class="stat-label">总访问</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i data-feather="star"></i></div>
            <div class="stat-content">
              <div class="stat-value" id="pagesAddedToday">0</div>
              <div class="stat-label">今日新增</div>
            </div>
          </div>
        </div>
        <div class="dashboard-content">
          <div class="dashboard-section">
            <h3 class="dashboard-section-title"><i data-feather="trending-up" style="display:inline-block;vertical-align:middle;margin-right:6px;"></i> 热门页面 TOP 10</h3>
            <div id="topPages" class="dashboard-list"></div>
          </div>
          <div class="dashboard-section">
            <h3 class="dashboard-section-title"><i data-feather="clock" style="display:inline-block;vertical-align:middle;margin-right:6px;"></i> 最近保存</h3>
            <div id="recentPages" class="dashboard-list"></div>
          </div>
        </div>
      </section>
      
      <div id="batchToolbar" class="batch-toolbar hidden" role="toolbar" aria-label="批量操作工具栏">
        <span id="selectedCount" class="selected-count">已选择 0 个页面</span>
        <div class="batch-actions">
          <button id="batchDeleteBtn" class="btn btn-danger btn-small" aria-label="批量删除"><i data-feather="trash-2" style="display:inline-block;vertical-align:middle;margin-right:4px;"></i> 删除</button>
          <button id="batchMoveBtn" class="btn btn-secondary btn-small" aria-label="批量移动"><i data-feather="folder" style="display:inline-block;vertical-align:middle;margin-right:4px;"></i> 移动到分组</button>
          <button id="batchAddTagsBtn" class="btn btn-secondary btn-small" aria-label="批量添加标签"><i data-feather="tag" style="display:inline-block;vertical-align:middle;margin-right:4px;"></i> 添加标签</button>
          <button id="batchExportBtn" class="btn btn-secondary btn-small" aria-label="批量导出"><i data-feather="upload" style="display:inline-block;vertical-align:middle;margin-right:4px;"></i> 导出</button>
          <button id="clearSelectionBtn" class="btn btn-secondary btn-small" aria-label="取消选择"><i data-feather="x" style="display:inline-block;vertical-align:middle;margin-right:4px;"></i> 取消</button>
        </div>
      </div>
      
      <div class="filter-sort-bar" role="region" aria-label="筛选和排序">
        <div class="filter-section">
          <div class="folder-selector" role="tablist" aria-label="分组筛选">
            <button class="filter-btn active" data-folder="all" role="tab" aria-selected="true">全部</button>
          </div>
          <div class="tag-cloud" id="tagCloud" role="region" aria-label="标签筛选"></div>
        </div>
        <div class="sort-section">
          <label for="sortBy" class="sort-label">排序：</label>
          <select id="sortBy" class="sort-select" aria-label="选择排序方式">
            <option value="lastVisitedAt">最近访问</option>
            <option value="createdAt">创建时间</option>
            <option value="visitCount">访问次数</option>
            <option value="title">标题</option>
          </select>
          <button id="sortOrderBtn" class="sort-order-btn" title="切换排序方向" aria-label="切换排序方向"><i data-feather="chevron-down"></i></button>
          <button id="columnToggleBtn" class="btn btn-secondary btn-small" aria-label="配置显示列"><i data-feather="columns"></i></button>
        </div>
      </div>
      
      <div id="pageList" class="page-list" role="list" aria-label="保存的页面列表">
        <div class="empty-state">
          <p>还没有保存的页面</p>
          <p>点击上方按钮添加第一个页面</p>
        </div>
      </div>
    </main>
  </div>
  
  <div id="settingsPanel" class="settings-panel hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="settings-panel-content">
      <div class="settings-panel-header">
        <h2 id="settingsTitle">设置</h2>
        <button id="closeSettingsBtn" class="close-btn" aria-label="关闭设置面板">&times;</button>
      </div>
      <div class="settings-panel-body">
        <div class="setting-group">
          <label class="setting-label">
            <input type="checkbox" id="showDashboardSetting" checked>
            显示统计仪表盘
          </label>
        </div>
        <div class="setting-group">
          <label class="setting-label">默认视图</label>
          <select id="defaultViewSetting" class="form-input">
            <option value="grouped">分组视图</option>
            <option value="flat-recent">最近访问优先</option>
          </select>
        </div>
        <div class="setting-group">
          <label class="setting-label">显示列</label>
          <div id="columnSettings" class="column-settings">
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div id="addPageModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">添加页面</h2>
        <button id="closeModalBtn" class="close-btn" aria-label="关闭对话框">&times;</button>
      </div>
      <form id="addPageForm" class="form">
        <input type="hidden" id="editingPageId">
        <div class="form-group">
          <label for="pageUrl">URL</label>
          <input type="url" id="pageUrl" required class="form-input">
        </div>
        <div class="form-group">
          <label for="pageTitle">标题</label>
          <input type="text" id="pageTitle" required class="form-input">
        </div>
        <div class="form-group">
          <label for="pageFolder">分组</label>
          <select id="pageFolder" class="form-input">
            <option value="">无分组</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pageTags">标签（用逗号分隔）</label>
          <input type="text" id="pageTags" placeholder="工作, 学习, 参考" class="form-input">
        </div>
        <div class="form-group">
          <label for="pageNotes">备注</label>
          <textarea id="pageNotes" rows="3" class="form-textarea"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">取消</button>
          <button type="submit" id="submitBtn" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
  
  <div id="addFolderModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="folderModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="folderModalTitle">新建分组</h2>
        <button id="closeFolderModalBtn" class="close-btn" aria-label="关闭对话框">&times;</button>
      </div>
      <form id="addFolderForm" class="form">
        <div class="form-group">
          <label for="folderName">分组名称</label>
          <input type="text" id="folderName" required class="form-input" placeholder="输入分组名称">
        </div>
        <div class="form-actions">
          <button type="button" id="cancelFolderBtn" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>
  
  <div id="batchMoveModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="batchMoveModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="batchMoveModalTitle">移动到分组</h2>
        <button id="closeBatchMoveModalBtn" class="close-btn" aria-label="关闭对话框">&times;</button>
      </div>
      <form id="batchMoveForm" class="form">
        <div class="form-group">
          <label for="batchMoveFolder">选择目标分组</label>
          <select id="batchMoveFolder" class="form-input">
            <option value="">无分组</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" id="cancelBatchMoveBtn" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">移动</button>
        </div>
      </form>
    </div>
  </div>
  
  <div id="batchAddTagsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="batchAddTagsModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="batchAddTagsModalTitle">添加标签</h2>
        <button id="closeBatchAddTagsModalBtn" class="close-btn" aria-label="关闭对话框">&times;</button>
      </div>
      <form id="batchAddTagsForm" class="form">
        <div class="form-group">
          <label for="batchAddTagsInput">标签（用逗号分隔）</label>
          <input type="text" id="batchAddTagsInput" placeholder="工作, 学习, 参考" class="form-input">
        </div>
        <div class="form-actions">
          <button type="button" id="cancelBatchAddTagsBtn" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    </div>
  </div>
  
  <input type="file" id="importFileInput" accept=".json" style="display: none;" aria-label="导入JSON文件">
  
  <script type="module" src="newtab.js"></script>
</body>
</html>
