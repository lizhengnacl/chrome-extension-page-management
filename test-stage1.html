<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阶段1测试 - 主题系统基础</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <h1>阶段1测试 - 主题系统基础</h1>
  <div id="test-results"></div>

  <script type="module">
    import { mockChromeStorage, clearMockStorage } from './js/test-helpers.js';
    import { UtilsTests } from './js/utils.test.js';
    import { ThemeManagerTests } from './js/theme-manager.test.js';
    import { UIComponentsTests } from './js/ui-components.test.js';

    async function runAllTests() {
      console.log('🚀 开始运行阶段1所有测试...\n');
      
      mockChromeStorage();
      clearMockStorage();
      
      let allPassed = true;
      
      console.log('='.repeat(60));
      allPassed &= await UtilsTests.runAll();
      
      clearMockStorage();
      
      console.log('\n' + '='.repeat(60));
      allPassed &= await ThemeManagerTests.runAll();
      
      clearMockStorage();
      
      console.log('\n' + '='.repeat(60));
      allPassed &= UIComponentsTests.runAll();
      
      console.log('\n' + '='.repeat(60));
      if (allPassed) {
        console.log('🎉 阶段1所有测试通过！');
      } else {
        console.log('❌ 阶段1部分测试失败');
      }
      
      return allPassed;
    }

    runAllTests();
  </script>
</body>
</html>
