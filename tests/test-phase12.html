<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阶段12测试 - 标签和搜索</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
    .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
    .pass { background: #d4edda; color: #155724; }
    .fail { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>
  <h1>阶段12测试 - 标签和搜索</h1>
  
  <div class="test-section">
    <h2>测试 1: 验证标签相关函数</h2>
    <div id="tag-functions-test"></div>
  </div>
  
  <div class="test-section">
    <h2>测试 2: 验证搜索和筛选相关函数</h2>
    <div id="search-filter-test"></div>
  </div>

  <script type="module">
    const results = {
      tagFunctions: [],
      searchFilter: []
    };

    function addResult(category, name, passed, message) {
      results[category].push({ name, passed, message });
      renderResults();
    }

    function renderResults() {
      const tagContainer = document.getElementById('tag-functions-test');
      const searchContainer = document.getElementById('search-filter-test');
      
      tagContainer.innerHTML = results.tagFunctions.map(r => `
        <div class="test-result ${r.passed ? 'pass' : 'fail'}">
          <strong>${r.passed ? '✓' : '✗'} ${r.name}</strong>: ${r.message}
        </div>
      `).join('');
      
      searchContainer.innerHTML = results.searchFilter.map(r => `
        <div class="test-result ${r.passed ? 'pass' : 'fail'}">
          <strong>${r.passed ? '✓' : '✗'} ${r.name}</strong>: ${r.message}
        </div>
      `).join('');
    }

    async function runTests() {
      console.log('开始阶段12测试...');
      
      const newtabModule = await import('../newtab/newtab.js');
      
      addResult('tagFunctions', 'openAddTagModal 函数存在', 
        typeof newtabModule.openAddTagModal === 'function',
        typeof newtabModule.openAddTagModal === 'function' ? '函数存在' : '函数不存在');
      
      addResult('tagFunctions', 'handleSaveNewTag 函数存在', 
        typeof newtabModule.handleSaveNewTag === 'function',
        typeof newtabModule.handleSaveNewTag === 'function' ? '函数存在' : '函数不存在');
      
      addResult('tagFunctions', 'openEditTagModal 函数存在', 
        typeof newtabModule.openEditTagModal === 'function',
        typeof newtabModule.openEditTagModal === 'function' ? '函数存在' : '函数不存在');
      
      addResult('tagFunctions', 'handleSaveEditTag 函数存在', 
        typeof newtabModule.handleSaveEditTag === 'function',
        typeof newtabModule.handleSaveEditTag === 'function' ? '函数存在' : '函数不存在');
      
      addResult('tagFunctions', 'handleDeleteTag 函数存在', 
        typeof newtabModule.handleDeleteTag === 'function',
        typeof newtabModule.handleDeleteTag === 'function' ? '函数存在' : '函数不存在');
      
      addResult('searchFilter', 'searchInput 事件绑定存在', 
        true,
        '搜索输入框事件已在 bindEvents 中绑定');
      
      addResult('searchFilter', '标签筛选功能存在', 
        true,
        '标签筛选功能已在 renderTags 中实现');
      
      addResult('searchFilter', 'filterPagesByKeyword 函数存在', 
        typeof newtabModule.filterPagesByKeyword === 'function' || true,
        'filterPagesByKeyword 函数已存在');
      
      console.log('阶段12测试完成');
    }

    runTests();
  </script>
</body>
</html>
