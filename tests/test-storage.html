<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存储模块测试 - 阶段7</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #666;
            margin-top: 30px;
        }
        .test-section {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .test-result {
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .pending {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover {
            background: #3367d6;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
        .log-section {
            margin-top: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>📋 存储模块测试 - 阶段7</h1>
    
    <div class="test-section">
        <h2>T7-01: exportData() 函数测试</h2>
        <div id="test-export-results"></div>
        <button id="btn-test-export">运行 exportData 测试</button>
    </div>
    
    <div class="test-section">
        <h2>T7-02: importData() 函数测试</h2>
        <div id="test-import-results"></div>
        <button id="btn-test-import">运行 importData 测试</button>
    </div>
    
    <div class="test-section">
        <h2>完整测试套件</h2>
        <button id="btn-run-all">运行所有测试</button>
        <button id="btn-reset">重置存储</button>
    </div>
    
    <div class="log-section">
        <h2>测试日志</h2>
        <pre id="test-log"></pre>
    </div>

    <script type="module">
        import { initStorage, getPages, getGroups, getTags, exportData, importData } from '../lib/storage.js';
        import { DEFAULT_DATA } from '../lib/constants.js';

        const logElement = document.getElementById('test-log');
        const exportResults = document.getElementById('test-export-results');
        const importResults = document.getElementById('test-import-results');

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logElement.textContent += `[${timestamp}] ${message}\n`;
        }

        function createResult(testName, status, message) {
            const div = document.createElement('div');
            div.className = `test-result ${status}`;
            div.innerHTML = `<strong>${testName}</strong>: ${message}`;
            return div;
        }

        async function resetStorage() {
            log('重置存储...');
            await chrome.storage.local.clear();
            await initStorage();
            log('存储已重置');
        }

        async function testExportData() {
            exportResults.innerHTML = '';
            log('=== 开始测试 exportData ===');
            
            await resetStorage();
            
            try {
                const result = await exportData();
                const parsed = JSON.parse(result);
                
                let allPassed = true;
                
                const test1 = createResult(
                    '测试1: 返回值是有效的JSON',
                    parsed ? 'pass' : 'fail',
                    parsed ? '✓ JSON解析成功' : '✗ JSON解析失败'
                );
                exportResults.appendChild(test1);
                if (!parsed) allPassed = false;
                
                const test2 = createResult(
                    '测试2: 包含version字段',
                    parsed && parsed.version ? 'pass' : 'fail',
                    parsed && parsed.version ? `✓ version: ${parsed.version}` : '✗ 缺少version字段'
                );
                exportResults.appendChild(test2);
                if (!parsed || !parsed.version) allPassed = false;
                
                const test3 = createResult(
                    '测试3: 包含exportedAt字段',
                    parsed && parsed.exportedAt ? 'pass' : 'fail',
                    parsed && parsed.exportedAt ? `✓ exportedAt: ${parsed.exportedAt}` : '✗ 缺少exportedAt字段'
                );
                exportResults.appendChild(test3);
                if (!parsed || !parsed.exportedAt) allPassed = false;
                
                const test4 = createResult(
                    '测试4: 包含pages数组',
                    parsed && Array.isArray(parsed.pages) ? 'pass' : 'fail',
                    parsed && Array.isArray(parsed.pages) ? `✓ pages数组存在，${parsed.pages.length}个页面` : '✗ 缺少pages数组'
                );
                exportResults.appendChild(test4);
                if (!parsed || !Array.isArray(parsed.pages)) allPassed = false;
                
                const test5 = createResult(
                    '测试5: 包含groups数组',
                    parsed && Array.isArray(parsed.groups) ? 'pass' : 'fail',
                    parsed && Array.isArray(parsed.groups) ? `✓ groups数组存在，${parsed.groups.length}个分组` : '✗ 缺少groups数组'
                );
                exportResults.appendChild(test5);
                if (!parsed || !Array.isArray(parsed.groups)) allPassed = false;
                
                const test6 = createResult(
                    '测试6: 包含tags数组',
                    parsed && Array.isArray(parsed.tags) ? 'pass' : 'fail',
                    parsed && Array.isArray(parsed.tags) ? `✓ tags数组存在，${parsed.tags.length}个标签` : '✗ 缺少tags数组'
                );
                exportResults.appendChild(test6);
                if (!parsed || !Array.isArray(parsed.tags)) allPassed = false;
                
                log(`exportData 测试${allPassed ? '通过' : '失败'}`);
                return allPassed;
                
            } catch (error) {
                const testError = createResult(
                    '测试异常',
                    'fail',
                    `✗ 错误: ${error.message}`
                );
                exportResults.appendChild(testError);
                log(`exportData 测试异常: ${error.message}`);
                return false;
            }
        }

        async function testImportData() {
            importResults.innerHTML = '';
            log('=== 开始测试 importData ===');
            
            await resetStorage();
            
            try {
                const testData = {
                    version: '1.0',
                    pages: [
                        { id: 'test-page-1', title: '测试页面1', url: 'https://test1.com', tags: [], groupId: null, isFavorite: false, createdAt: Date.now(), updatedAt: Date.now() },
                        { id: 'test-page-2', title: '测试页面2', url: 'https://test2.com', tags: ['test-tag-1'], groupId: 'test-group-1', isFavorite: true, createdAt: Date.now(), updatedAt: Date.now() }
                    ],
                    groups: [
                        { id: 'test-group-1', name: '测试分组1', createdAt: Date.now() }
                    ],
                    tags: [
                        { id: 'test-tag-1', name: '测试标签1', color: '#ff0000' }
                    ]
                };
                
                await importData(JSON.stringify(testData));
                
                let allPassed = true;
                
                const pages = await getPages();
                const test1 = createResult(
                    '测试1: 导入的pages数量正确',
                    pages.length === 2 ? 'pass' : 'fail',
                    pages.length === 2 ? `✓ 导入了${pages.length}个页面` : `✗ 期望2个页面，实际${pages.length}个`
                );
                importResults.appendChild(test1);
                if (pages.length !== 2) allPassed = false;
                
                const groups = await getGroups();
                const test2 = createResult(
                    '测试2: 导入的groups数量正确',
                    groups.length === 1 ? 'pass' : 'fail',
                    groups.length === 1 ? `✓ 导入了${groups.length}个分组` : `✗ 期望1个分组，实际${groups.length}个`
                );
                importResults.appendChild(test2);
                if (groups.length !== 1) allPassed = false;
                
                const tags = await getTags();
                const test3 = createResult(
                    '测试3: 导入的tags数量正确',
                    tags.length === 1 ? 'pass' : 'fail',
                    tags.length === 1 ? `✓ 导入了${tags.length}个标签` : `✗ 期望1个标签，实际${tags.length}个`
                );
                importResults.appendChild(test3);
                if (tags.length !== 1) allPassed = false;
                
                const test4 = createResult(
                    '测试4: 页面数据正确',
                    pages[0]?.title === '测试页面1' ? 'pass' : 'fail',
                    pages[0]?.title === '测试页面1' ? '✓ 页面标题正确' : '✗ 页面标题不正确'
                );
                importResults.appendChild(test4);
                if (!pages[0] || pages[0].title !== '测试页面1') allPassed = false;
                
                log(`importData 测试${allPassed ? '通过' : '失败'}`);
                return allPassed;
                
            } catch (error) {
                const testError = createResult(
                    '测试异常',
                    'fail',
                    `✗ 错误: ${error.message}`
                );
                importResults.appendChild(testError);
                log(`importData 测试异常: ${error.message}`);
                return false;
            }
        }

        async function runAllTests() {
            log('=== 开始运行所有测试 ===');
            const exportPassed = await testExportData();
            const importPassed = await testImportData();
            const allPassed = exportPassed && importPassed;
            log(`=== 所有测试完成，结果: ${allPassed ? '全部通过' : '部分失败'} ===`);
        }

        document.getElementById('btn-test-export').addEventListener('click', testExportData);
        document.getElementById('btn-test-import').addEventListener('click', testImportData);
        document.getElementById('btn-run-all').addEventListener('click', runAllTests);
        document.getElementById('btn-reset').addEventListener('click', resetStorage);

        log('测试页面已加载，请点击按钮运行测试');
    </script>
</body>
</html>
