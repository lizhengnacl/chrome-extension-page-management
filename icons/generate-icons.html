<!DOCTYPE html>
<html>
<head>
    <title>Generate Extension Icons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .icon-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .icon-item {
            text-align: center;
        }
        canvas {
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            margin: 10px 0;
        }
        button:hover {
            background: #3367d6;
        }
    </style>
</head>
<body>
    <h1>Chrome Extension Icons Generator</h1>
    <p>Click the button below to generate and download the plugin icons:</p>
    
    <button id="generateBtn">Generate and Download Icons</button>
    
    <div class="icon-container" id="iconContainer"></div>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;
            
            // Background - gradient blue
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#4285f4');
            gradient.addColorStop(1, '#3367d6');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.15);
            ctx.fill();
            
            // Draw folder/bookmark icon
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = Math.max(2, size / 16);
            
            // Simplified folder/bookmark shape
            const pad = size * 0.15;
            const w = size - pad * 2;
            const h = size - pad * 2;
            
            // Draw pages
            ctx.beginPath();
            ctx.rect(pad, pad + h * 0.25, w * 0.7, h * 0.5);
            ctx.fill();
            
            // Draw folder tab
            ctx.beginPath();
            ctx.moveTo(pad, pad);
            ctx.lineTo(pad + w * 0.4, pad);
            ctx.lineTo(pad + w * 0.4, pad + h * 0.25);
            ctx.lineTo(pad, pad + h * 0.25);
            ctx.closePath();
            ctx.fill();
            
            // Draw star for bookmark
            ctx.fillStyle = '#fbbc05';
            const starX = pad + w * 0.75;
            const starY = pad + h * 0.4;
            const starR = size * 0.12;
            drawStar(ctx, starX, starY, 5, starR, starR * 0.5);
        }
        
        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;
            
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }
        
        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        document.getElementById('generateBtn').addEventListener('click', function() {
            const container = document.getElementById('iconContainer');
            container.innerHTML = '';
            
            const sizes = [16, 48, 128];
            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                
                drawIcon(canvas, size);
                
                const div = document.createElement('div');
                div.className = 'icon-item';
                div.innerHTML = `
                    <h3>${size}x${size}</h3>
                `;
                div.appendChild(canvas);
                container.appendChild(div);
                
                downloadCanvas(canvas, `icon${size}.png`);
            });
            
            alert('Icons generated and downloaded! Please place them in the icons/ folder.');
        });
        
        // Polyfill for roundRect if needed
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                if (typeof radius === 'number') {
                    radius = {tl: radius, tr: radius, br: radius, bl: radius};
                }
                this.moveTo(x + radius.tl, y);
                this.lineTo(x + width - radius.tr, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
                this.lineTo(x + width, y + height - radius.br);
                this.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
                this.lineTo(x + radius.bl, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
                this.lineTo(x, y + radius.tl);
                this.quadraticCurveTo(x, y, x + radius.tl, y);
                this.closePath();
            };
        }
    </script>
</body>
</html>
