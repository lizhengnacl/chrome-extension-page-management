<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utils测试</title>
</head>
<body>
  <h1>Utils测试</h1>
  <div id="test-results"></div>

  <script type="module">
    import {
      generateId,
      formatDate,
      isValidUrl,
      debounce,
      parseTags,
      supportsColorSchemePreference,
      getSystemColorScheme
    } from './js/utils.js';

    console.log('🧪 开始测试utils.js...');
    
    let allPassed = true;
    
    try {
      console.log('测试 generateId...');
      const id1 = generateId('test');
      const id2 = generateId('test');
      console.assert(id1.startsWith('test_'), 'ID应以test_开头');
      console.assert(id1 !== id2, '两次生成的ID应不同');
      console.log('✅ generateId 通过');
    } catch (e) {
      console.error('❌ generateId 失败:', e.message);
      allPassed = false;
    }
    
    try {
      console.log('测试 formatDate...');
      const now = new Date().toISOString();
      const result = formatDate(now);
      console.assert(typeof result === 'string', '应返回字符串');
      console.log('✅ formatDate 通过');
    } catch (e) {
      console.error('❌ formatDate 失败:', e.message);
      allPassed = false;
    }
    
    try {
      console.log('测试 isValidUrl...');
      console.assert(isValidUrl('https://example.com') === true, '有效URL应返回true');
      console.assert(isValidUrl('not-a-url') === false, '无效URL应返回false');
      console.log('✅ isValidUrl 通过');
    } catch (e) {
      console.error('❌ isValidUrl 失败:', e.message);
      allPassed = false;
    }
    
    try {
      console.log('测试 parseTags...');
      const tags = parseTags('工作, 学习, 参考');
      console.assert(Array.isArray(tags), '应返回数组');
      console.assert(tags.length === 3, '应解析出3个标签');
      console.log('✅ parseTags 通过');
    } catch (e) {
      console.error('❌ parseTags 失败:', e.message);
      allPassed = false;
    }
    
    try {
      console.log('测试 supportsColorSchemePreference...');
      const result = supportsColorSchemePreference();
      console.assert(typeof result === 'boolean', '应返回布尔值');
      console.log('✅ supportsColorSchemePreference 通过');
    } catch (e) {
      console.error('❌ supportsColorSchemePreference 失败:', e.message);
      allPassed = false;
    }
    
    try {
      console.log('测试 getSystemColorScheme...');
      const scheme = getSystemColorScheme();
      console.assert(scheme === 'light' || scheme === 'dark', '应返回 light 或 dark');
      console.log('✅ getSystemColorScheme 通过');
    } catch (e) {
      console.error('❌ getSystemColorScheme 失败:', e.message);
      allPassed = false;
    }
    
    console.log('\n' + '='.repeat(60));
    if (allPassed) {
      console.log('🎉 所有utils.js测试通过！');
    } else {
      console.log('❌ 部分测试失败');
    }
  </script>
</body>
</html>
