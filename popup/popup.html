<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加页面</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>添加当前页面</h1>
    
    <div id="pageInfo" class="page-info">
      <div class="favicon-container">
        <img id="favicon" src="" alt="favicon" class="favicon">
      </div>
      <div class="page-details">
        <div id="pageTitle" class="page-title"></div>
        <div id="pageUrl" class="page-url"></div>
      </div>
    </div>

    <div class="form-group">
      <label for="tags">标签</label>
      <div id="tagsContainer" class="tags-container"></div>
      <div class="add-tag-container">
        <input type="text" id="newTagInput" placeholder="输入新标签名称" class="tag-input">
        <button id="addTagBtn" class="btn btn-secondary">添加标签</button>
      </div>
    </div>

    <div class="form-group">
      <label for="group">分组</label>
      <select id="groupSelect" class="group-select">
        <option value="">未分组</option>
      </select>
    </div>

    <button id="addPageBtn" class="btn btn-primary">添加页面</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
